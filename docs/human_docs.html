<body class="bg-slate-100 dark:bg-slate-900 text-slate-800

<div class="flex h-screen overflow-hidden">

                  px-2 py-1 text-xs text-white">Go</button>

          <button data-api="impact" class="apibtn rounded bg-slate-200

                  dark:bg-slate-800 px-2 py-1 text-xs">Similar to
                  current</button>

                  dark:bg-slate-800 px-2 py-1 text-xs">Gaps</button>

        <pre id="apiout" class="mt-2 hidden max-h-72 overflow-auto rounded
             bg-slate-900 p-2 text-[11px] leading-snug

  <main id="main" class="flex-1 overflow-y-auto">

      <p class="text-slate-500">Loading corpus…</p>
    </div>

<script>
"use strict";
// Repo root prefix — this file lives at <root>/docs/human_docs.html and
// works under any mount path as long as the repo root is served.
const BASE = location.pathname.replace(/docs\/human_docs\.html$/, "");
const TYPE_DIRS = [
  ["goals", "Goals"], ["epics", "Epics"], ["stories", "Stories"],
  ["spikes", "Spikes"], ["components", "Components"],
  ["conflicts", "Conflicts"], ["change-proposals", "Change Proposals"],
  ["consolidations", "Consolidations"], ["decisions", "Decisions"],
  ["sessions", "Sessions"],
];
const EXTRA_FILES = ["docs/TRIGGERS.md", "CONTEXT.md", "AGENTS.md"];
const ID_RE = /\b(?:BG|EP|ST|SP|CMP|SES|DEC|CFL|CON|CP)-\d{4}\b/g;
const STATUS_STYLE = {
  approved: "bg-emerald-100 text-emerald-800 dark:bg-emerald-900 dark:text-emerald-200",
  accepted: "bg-emerald-100 text-emerald-800 dark:bg-emerald-900 dark:text-emerald-200",
  resolved: "bg-emerald-100 text-emerald-800 dark:bg-emerald-900 dark:text-emerald-200",
  closed: "bg-slate-200 text-slate-700 dark:bg-slate-800 dark:text-slate-300",
  draft: "bg-amber-100 text-amber-800 dark:bg-amber-900 dark:text-amber-200",
  gated: "bg-violet-100 text-violet-800 dark:bg-violet-900 dark:text-violet-200",
  stale: "bg-rose-100 text-rose-800 dark:bg-rose-900 dark:text-rose-200",
  deferred: "bg-zinc-200 text-zinc-600 dark:bg-zinc-800 dark:text-zinc-400",
  superseded: "bg-zinc-200 text-zinc-500 line-through dark:bg-zinc-800 dark:text-zinc-500",
};
const store = new Map();     // id → artifact
const files = new Map();     // path → {path, title, raw, fm, body}
let mentions = new Map();    // id → Set(path of docs whose prose mentions it)
let apiOn = false;

const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;")
                  .replace(/>/g, "&gt;").replace(/"/g, "&quot;");

/* ---------- frontmatter (subset YAML) ---------- */
function parseFM(raw) {
  const m = raw.match(/^---\n([\s\S]*?)\n---\n?/);
  if (!m) return [null, raw];
  const fm = {};
  let ctx = fm, pendKey = null, pendVal = "";
  for (const line of m[1].split("\n")) {
    if (pendKey) {                       // continuing a [ ... ] array
      pendVal += " " + line.trim();
      if (pendVal.includes("]")) {
        ctx[pendKey] = pendVal.slice(pendVal.indexOf("[") + 1,
          pendVal.indexOf("]")).split(",").map(s => s.trim())
          .filter(Boolean);
        pendKey = null;
      }
      continue;
    }
    if (/^\S/.test(line)) ctx = fm;      // top level
    const kv = line.match(/^\s*([\w-]+):\s*(.*)$/);
    if (!kv) continue;
    let [, k, v] = kv;
    if (v === "") { ctx[k] = {}; ctx = ctx[k]; continue; }   // nested map
    if (v.startsWith("[") && !v.includes("]")) {
      pendKey = k; pendVal = v; continue;
    }
    if (v.startsWith("[")) {
      ctx[k] = v.slice(1, v.lastIndexOf("]")).split(",")
        .map(s => s.trim()).filter(Boolean);
    } else {
      ctx[k] = v.replace(/^["']|["']$/g, "").replace(/\s+#.*$/, "");
    }
  }
  return [fm, raw.slice(m[0].length)];
}

/* ---------- markdown renderer (corpus dialect) ---------- */
function inline(text, selfId) {
  const codes = [];
  let t = esc(text).replace(/`([^`\n]*)`/g, (_, c) =>
    `\x00${codes.push(`<code>${c}</code>`) - 1}\x00`);
  t = t.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, txt, url) => {
    if (/^https?:|^mailto:/.test(url))
      return `<a href="${url}" target="_blank" rel="noopener">${txt}</a>`;
    return `<a href="#/f/${resolvePath(url)}">${txt}</a>`;
  });
  t = t.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
  t = t.replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,;:]|$)/g, "$1<em>$2</em>");
  t = t.replace(ID_RE, id => (store.has(id) && id !== selfId)
    ? `<a class="artifact" href="#/${id}">${id}</a>` : id);
  t = t.replace(/\bTRG-\d{4}\b/g, id =>
    `<a class="artifact" href="#/f/docs/TRIGGERS.md">${id}</a>`);
  return t.replace(/\x00(\d+)\x00/g, (_, i) => codes[i]);
}
let curDocDir = "";
function resolvePath(rel) {
  const parts = (curDocDir + "/" + rel.split("#")[0]).split("/");
  const out = [];
  for (const p of parts) {
    if (p === "" || p === ".") continue;
    if (p === "..") out.pop(); else out.push(p);
  }
  return out.join("/");
}
function renderMD(body, selfId) {
  const blocks = body.split(/^```/m);
  let html = "";
  for (let i = 0; i < blocks.length; i++) {
    if (i % 2 === 1) {                    // fenced block
      const nl = blocks[i].indexOf("\n");
      const lang = blocks[i].slice(0, nl).trim();
      const code = blocks[i].slice(nl + 1).replace(/\n$/, "");
      html += lang === "mermaid"
        ? `<div class="mermaid-box my-3"><pre class="mermaid-src hidden">${esc(code)}</pre></div>`
        : `<pre><code>${esc(code)}</code></pre>`;
      continue;
    }
    html += renderProse(blocks[i], selfId);
  }
  return html;
}
function renderProse(text, selfId) {
  const lines = text.split("\n");
  let html = "", para = [], list = null, table = null, quote = [];
  const flushP = () => { if (para.length) {
    html += `<p>${inline(para.join(" "), selfId)}</p>`; para = []; } };
  const flushL = () => { if (list) { html += closeList(list); list = null; } };
  const flushT = () => { if (table) { html += renderTable(table, selfId);
    table = null; } };
  const flushQ = () => { if (quote.length) {
    html += `<blockquote>${renderProse(quote.join("\n"), selfId)}</blockquote>`;
    quote = []; } };
  const flushAll = () => { flushP(); flushL(); flushT(); flushQ(); };

  function closeList(l) {
    let out = `<${l.tag}>`;
    for (const item of l.items) {
      out += `<li>${inline(item.text, selfId)}`;
      if (item.sub.length) {
        out += `<ul>${item.sub.map(s =>
          `<li>${inline(s, selfId)}</li>`).join("")}</ul>`;
      }
      out += "</li>";
    }
    return out + `</${l.tag}>`;
  }
  function renderTable(rows, sid) {
    const cells = r => r.split("|").slice(1, -1).map(c => c.trim());
    let out = "<table><thead><tr>";
    out += cells(rows[0]).map(c => `<th>${inline(c, sid)}</th>`).join("");
    out += "</tr></thead><tbody>";
    for (const r of rows.slice(2)) out += "<tr>" +
      cells(r).map(c => `<td>${inline(c, sid)}</td>`).join("") + "</tr>";
    return out + "</tbody></table>";
  }

  for (const line of lines) {
    const h = line.match(/^(#{1,4})\s+(.*)$/);
    if (h) { flushAll();
      html += `<h${h[1].length}>${inline(h[2], selfId)}</h${h[1].length}>`;
      continue; }
    if (/^(---|\*\*\*)\s*$/.test(line)) { flushAll(); html += "<hr>";
      continue; }
    if (line.startsWith(">")) { flushP(); flushL(); flushT();
      quote.push(line.replace(/^>\s?/, "")); continue; }
    if (/^\|.*\|\s*$/.test(line)) { flushP(); flushL(); flushQ();
      (table = table || []).push(line); continue; }
    const bullet = line.match(/^(\s*)([-*]|\d+\.)\s+(.*)$/);
    if (bullet) { flushP(); flushT(); flushQ();
      const [, ind, mark, text] = bullet;
      const tag = /\d/.test(mark) ? "ol" : "ul";
      if (ind.length >= 2 && list && list.items.length) {
        list.items[list.items.length - 1].sub.push(text);
      } else {
        if (!list || list.tag !== tag && ind.length < 2) {
          flushL(); list = { tag, items: [] };
        }
        list.items.push({ text, sub: [] });
      }
      continue; }
    if (/^\s*$/.test(line)) { flushAll(); continue; }
    if (list) {                          // continuation of a list item
      const last = list.items[list.items.length - 1];
      if (last.sub.length) last.sub[last.sub.length - 1] += " " +
        line.trim();
      else last.text += " " + line.trim();
      continue; }
    if (quote.length) { quote.push(line); continue; }
    if (table) { flushT(); }
    para.push(line.trim());
  }
  flushAll();
  return html;
}

/* ---------- corpus loading ---------- */
async function listDir(path) {
  try {
    const html = await (await fetch(BASE + path + "/")).text();
    return [...html.matchAll(/href="([^"?]+\.md)"/g)].map(m =>
      path + "/" + decodeURIComponent(m[1]));
  } catch { return []; }
}
async function loadCorpus() {
  const listings = await Promise.all(
    TYPE_DIRS.map(([d]) => listDir("docs/" + d))
      .concat([listDir("docs/specs")]));
  const paths = listings.flat().concat(EXTRA_FILES);
  await Promise.all(paths.map(async p => {
    try {
      const raw = await (await fetch(BASE + p)).text();
      const [fm, body] = parseFM(raw);
      const doc = { path: p, raw, fm, body,
        title: fm?.title || p.split("/").pop() };
      files.set(p, doc);
      if (fm?.id) store.set(fm.id, doc);
    } catch { /* unreadable file — skip */ }
  }));
  mentions = new Map();
  for (const [p, doc] of files) {
    const seen = new Set(doc.body.match(ID_RE) || []);
    for (const id of seen)
      if (id !== doc.fm?.id)
        (mentions.get(id) || mentions.set(id, new Set()).get(id)).add(p);
  }
  buildNav();
  route();
}

/* ---------- navigation ---------- */
function badge(status) {
  const cls = STATUS_STYLE[status] ||
    "bg-slate-200 text-slate-600 dark:bg-slate-800 dark:text-slate-400";
  return `<span class="ml-1 rounded px-1 py-0.5 text-[10px] font-medium
          ${cls}">${status || "?"}</span>`;
}
function navEntry(doc) {
  const id = doc.fm?.id;
  const href = id ? `#/${id}` : `#/f/${doc.path}`;
  const label = id ? `<span class="font-mono text-xs">${id}</span> ` : "";
  return `<a href="${href}" class="block truncate rounded px-2 py-1
          hover:bg-indigo-50 dark:hover:bg-slate-800"
          title="${esc(doc.title)}">${label}${esc(doc.title)}
          ${doc.fm?.status ? badge(doc.fm.status) : ""}</a>`;
}
function buildNav(filter) {
  const nav = document.getElementById("nav");
  let html = "";
  if (filter) {
    const q = filter.toLowerCase();
    const hits = [...files.values()].map(d => {
      const id = (d.fm?.id || "").toLowerCase();
      const title = d.title.toLowerCase();
      let score = 0;
      if (id.startsWith(q)) score = 3;
      else if (id.includes(q) || title.includes(q)) score = 2;
      else if (d.body.toLowerCase().includes(q)) score = 1;
      return { d, score };
    }).filter(h => h.score).sort((a, b) => b.score - a.score).slice(0, 60);
    html = `<div class="px-2 py-1 text-xs uppercase tracking-wide
            text-slate-400">${hits.length} result(s)</div>` +
      hits.map(h => navEntry(h.d)).join("");
  } else {
    for (const [dir, label] of TYPE_DIRS) {
      const docs = [...files.values()]
        .filter(d => d.path.startsWith("docs/" + dir + "/"))
        .sort((a, b) => (a.fm?.id || "").localeCompare(b.fm?.id || ""));
      if (!docs.length) continue;
      html += `<details ${["goals", "components"].includes(dir) ?
        "open" : ""}><summary class="cursor-pointer px-2 py-1 text-xs
        font-semibold uppercase tracking-wide text-slate-500">${label}
        (${docs.length})</summary>${docs.map(navEntry).join("")}</details>`;
    }
    const extras = [...files.values()].filter(d =>
      !d.fm?.id && (d.path.startsWith("docs/specs/") ||
                    EXTRA_FILES.includes(d.path)));
    html += `<details><summary class="cursor-pointer px-2 py-1 text-xs
      font-semibold uppercase tracking-wide text-slate-500">Project files
      (${extras.length})</summary>${extras.map(navEntry).join("")}</details>`;
  }
  nav.innerHTML = html;
}

/* ---------- artifact view ---------- */
function chips(label, ids) {
  if (!ids || !ids.length) return "";
  return `<div class="mt-1"><span class="mr-1 text-xs font-semibold
    text-slate-500">${label}:</span>${ids.map(id => store.has(id)
      ? `<a class="mr-1 rounded bg-indigo-100 px-1.5 py-0.5 font-mono
         text-xs text-indigo-800 hover:bg-indigo-200 dark:bg-indigo-950
         dark:text-indigo-300" href="#/${id}">${id}</a>`
      : `<span class="mr-1 font-mono text-xs">${id}</span>`).join("")}
    </div>`;
}
function show(doc) {
  curDocDir = doc.path.split("/").slice(0, -1).join("/");
  const fm = doc.fm || {};
  const id = fm.id;
  let head = "";
  if (fm.id) {
    head = `<div class="mb-4 rounded-lg border border-slate-200
      bg-white p-4 dark:border-slate-800 dark:bg-slate-950">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="font-mono text-sm font-bold">${fm.id}</span>
        ${badge(fm.status)}
        <span class="text-xs text-slate-500">${fm.type || ""}</span>
        ${fm["component-type"] ? `<span class="text-xs text-slate-500">
          (${fm["component-type"]})</span>` : ""}
        <span class="ml-auto text-xs text-slate-400">
          ${fm["approved-on"] ? "approved " + fm["approved-on"]
            : fm["decided-on"] ? "decided " + fm["decided-on"]
            : fm.created ? "created " + fm.created : ""}</span>
      </div>
      ${Object.entries(fm.links || {}).map(([k, v]) =>
        chips(k, Array.isArray(v) ? v : [v])).join("")}
      ${chips("cites", fm.cites)}
    </div>`;
  } else {
    head = `<div class="mb-4 text-xs text-slate-400 font-mono">
      ${doc.path}</div>`;
  }
  let back = "";
  if (id) {
    const inbound = [];
    for (const [oid, od] of store) {
      if (oid === id) continue;
      const l = od.fm?.links || {};
      const all = Object.values(l).flat().concat(od.fm?.cites || []);
      if (all.includes(id)) inbound.push(oid);
    }
    const mset = [...(mentions.get(id) || [])]
      .map(p => files.get(p)).filter(d => d.fm?.id !== id);
    back = `<div class="mt-8 rounded-lg border border-slate-200 bg-white
      p-4 text-sm dark:border-slate-800 dark:bg-slate-950">
      <div class="mb-1 font-semibold">Referenced by</div>
      ${chips("frontmatter", inbound.sort())}
      ${chips("prose", mset.map(d => d.fm?.id).filter(Boolean).sort())}
      ${!inbound.length && !mset.length
        ? '<span class="text-slate-400">nothing yet</span>' : ""}
    </div>`;
  }
  document.getElementById("content").innerHTML =
    head + `<article class="md">${renderMD(doc.body, id)}</article>` + back;
  document.getElementById("main").scrollTop = 0;
  renderMermaid();
}
async function renderMermaid() {
  const boxes = document.querySelectorAll(".mermaid-box");
  if (!boxes.length) return;
  for (let i = 0; i < 40 && !window.__mermaid; i++)
    await new Promise(r => setTimeout(r, 250));
  if (!window.__mermaid) return;
  let n = 0;
  for (const box of boxes) {
    const src = box.querySelector(".mermaid-src").textContent;
    try {
      const { svg } = await window.__mermaid.render("mm" + (n++), src);
      box.insertAdjacentHTML("beforeend", svg);
    } catch {
      box.innerHTML = `<pre><code>${esc(src)}</code></pre>`;
    }
  }
}

/* ---------- routing ---------- */
function currentId() {
  const h = location.hash.slice(2);
  return store.has(h) ? h : null;
}
function route() {
  const h = location.hash.slice(2);          // strip "#/"
  if (!h) {
    const first = store.get("BG-0001") || [...files.values()][0];
    if (first) show(first);
    return;
  }
  if (h.startsWith("f/")) {
    const doc = files.get(h.slice(2));
    if (doc) { show(doc); return; }
  }
  if (store.has(h)) { show(store.get(h)); return; }
  document.getElementById("content").innerHTML =
    `<p class="text-rose-600">Not found: ${esc(h)}</p>`;
}
window.addEventListener("hashchange", route);

/* ---------- search + API panel ---------- */
document.getElementById("q").addEventListener("input", e => {
  const v = e.target.value.trim();
  buildNav(v.length >= 2 ? v : null);
});
async function probeApi() {
  try {
    const r = await fetch(BASE + "api/ping");
    apiOn = r.ok && (await r.text()).trim() === "ok";
  } catch { apiOn = false; }
  document.getElementById("apibox").classList.toggle("hidden", !apiOn);
}
document.querySelectorAll(".apibtn").forEach(btn =>
  btn.addEventListener("click", async () => {
    const kind = btn.dataset.api;
    const out = document.getElementById("apiout");
    let url;
    if (kind === "search") {
      const q = document.getElementById("semq").value.trim();
      if (!q) return;
      url = BASE + `api/search?q=${encodeURIComponent(q)}&k=10`;
    } else if (["impact", "trace"].includes(kind)) {
      const id = currentId();
      if (!id) { out.classList.remove("hidden");
        out.textContent = "Open an artifact first."; return; }
      url = BASE + `api/graph?cmd=${kind}&arg=${id}`;
    } else if (kind === "similar") {
      const id = currentId();
      if (!id) { out.classList.remove("hidden");
        out.textContent = "Open an artifact first."; return; }
      url = BASE + `api/similar?id=${id}`;
    } else {
      url = BASE + `api/graph?cmd=${kind}`;
    }
    out.classList.remove("hidden");
    out.textContent = "running…";
    try {
      const r = await fetch(url);
      const text = await r.text();
      out.innerHTML = esc(text).replace(ID_RE, id => store.has(id)
        ? `<a class="text-indigo-300 underline" href="#/${id}">${id}</a>`
        : id);
    } catch (e) { out.textContent = "request failed: " + e; }
  }));

loadCorpus();
probeApi();
</script>
</body>
</html>
